services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ${DB_NAME:-pro_channels}
      MYSQL_USER: ${DB_USER:-pro_channels}
      MYSQL_PASSWORD: ${DB_PASSWORD:-pro_channels_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password_change_me}
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      # Важно: healthcheck выполняется ВНУТРИ контейнера db.
      # Там доступен MYSQL_ROOT_PASSWORD, а переменной DB_ROOT_PASSWORD внутри контейнера нет.
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  web:
    build: .
    env_file: .env
    ports:
      - "127.0.0.1:8001:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    restart: unless-stopped

  celery:
    build: .
    env_file: .env
    command: celery -A pro_channels worker -l INFO
    depends_on:
      web:
        condition: service_started
      redis:
        condition: service_started
      db:
        condition: service_healthy
    volumes:
      - media_volume:/app/media
    restart: unless-stopped

  celery-beat:
    build: .
    env_file: .env
    command: celery -A pro_channels beat -l INFO
    depends_on:
      web:
        condition: service_started
      redis:
        condition: service_started
      db:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    profiles: ["docker-nginx"]
    depends_on:
      web:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/static:ro
      - media_volume:/media:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    profiles: ["docker-nginx"]
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: sh
    command: -c "echo 'certbot container ready'"

volumes:
  mysql_data:
  static_volume:
  media_volume:
  letsencrypt:
  certbot_www:

