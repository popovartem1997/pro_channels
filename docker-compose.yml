services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ${DB_NAME:-pro_channels}
      MYSQL_USER: ${DB_USER:-pro_channels}
      MYSQL_PASSWORD: ${DB_PASSWORD:-pro_channels_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password_change_me}
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      # Важно: healthcheck выполняется ВНУТРИ контейнера db.
      # Там доступен MYSQL_ROOT_PASSWORD, а переменной DB_ROOT_PASSWORD внутри контейнера нет.
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  web:
    build: .
    env_file: .env
    # Перекрываем .env: внутри контейнера 127.0.0.1 — это не сервис redis, задачи и кэш «теряются».
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      DJANGO_CACHE_REDIS_URL: redis://redis:6379/2
      # redis: один держатель сессии Telethon на owner_id между воркерами; TTL+renew, см. clear_telethon_session_locks при сбоях.
      TELETHON_SESSION_LOCK_BACKEND: redis
      # Из .env иногда остаётся True — тогда .delay() в web и не попадает в Redis.
      CELERY_TASK_ALWAYS_EAGER: "false"
    ports:
      # Временно открываем web наружу по IP:8001 (пока домен/HTTPS в процессе настройки)
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    # Порт открыт = Gunicorn слушает (TCP: без HTTP, иначе 400 DisallowedHost при узком ALLOWED_HOSTS).
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import socket; s=socket.socket(); s.settimeout(3); s.connect(('127.0.0.1',8000)); s.close()",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 120s
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    restart: unless-stopped

  # Только очередь prio: публикация постов, check_scheduled_posts, digest/факты.
  # Отдельно от «celery», иначе долгий парсинг (parse) занимает все слоты — в prio копятся сотни задач и посты висят в «Публикуется».
  celery-prio:
    build: .
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      DJANGO_CACHE_REDIS_URL: redis://redis:6379/2
      TELETHON_SESSION_LOCK_BACKEND: redis
      CELERY_TASK_ALWAYS_EAGER: "false"
    command: celery -A pro_channels worker -l INFO -n prio@%h -Q prio -c 4
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    volumes:
      - media_volume:/app/media
    restart: unless-stopped

  # Парсинг, импорт TG→MAX, прочее — без конкуренции с публикацией.
  celery:
    build: .
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      DJANGO_CACHE_REDIS_URL: redis://redis:6379/2
      TELETHON_SESSION_LOCK_BACKEND: redis
      CELERY_TASK_ALWAYS_EAGER: "false"
    command: celery -A pro_channels worker -l INFO -n bg@%h -Q import_history,celery,parse -c 4
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    volumes:
      - media_volume:/app/media
    restart: unless-stopped

  celery-beat:
    build: .
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      DJANGO_CACHE_REDIS_URL: redis://redis:6379/2
      TELETHON_SESSION_LOCK_BACKEND: redis
      CELERY_TASK_ALWAYS_EAGER: "false"
    command: celery -A pro_channels beat -l INFO
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    profiles: ["docker-nginx"]
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/static:ro
      - media_volume:/media:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    profiles: ["docker-nginx"]
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: sh
    command: -c "echo 'certbot container ready'"

volumes:
  mysql_data:
  static_volume:
  media_volume:
  letsencrypt:
  certbot_www:

