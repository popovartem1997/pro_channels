{% extends 'base.html' %}
{% block title %}Добавить источник{% endblock %}

{% block content %}
<div class="page-header">
  <a href="{% url 'parsing:sources' %}" class="btn btn-link text-muted p-0 mb-2 text-decoration-none small">
    <i class="bi bi-arrow-left me-1"></i> К источникам
  </a>
  <h1>Добавить источник</h1>
</div>

<div class="row justify-content-center">
  <div class="col-12 col-lg-6">
    <div class="card">
      <div class="card-body p-4 p-md-5">
        <form method="post" novalidate>
          {% csrf_token %}
          {% if selected_channel %}
            <input type="hidden" name="channel_id" value="{{ selected_channel.pk }}">
          {% endif %}

          <div class="mb-3">
            <label class="form-label fw-semibold" for="id_name">Название</label>
            <input type="text" name="name" id="id_name" class="form-control"
                   value="{{ request.POST.name|default:'' }}"
                   placeholder="Например: Новости конкурентов" required>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold" for="id_platform">Платформа</label>
            <select name="platform" id="id_platform" class="form-select" required>
              <option value="">— Выберите платформу —</option>
              {% for val, label in platforms %}
                <option value="{{ val }}" {% if request.POST.platform == val %}selected{% endif %}>{{ label }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold" for="id_source_id">ID / URL источника</label>
            <input type="text" name="source_id" id="id_source_id" class="form-control font-monospace"
                   value="{{ request.POST.source_id|default:'' }}"
                   placeholder="" required>
            <div id="id_source_help" class="form-text small mt-2"></div>
          </div>

          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-brand px-4 fw-semibold">
              <i class="bi bi-plus-lg me-1"></i> Добавить источник
            </button>
            <a href="{% url 'parsing:sources' %}" class="btn btn-outline-secondary">Отмена</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
(function () {
  var plat = document.getElementById('id_platform');
  var inp = document.getElementById('id_source_id');
  var help = document.getElementById('id_source_help');
  if (!plat || !inp || !help) return;

  var hints = {
    telegram: 'Telegram: укажите <code>@username</code> канала (как в ссылке t.me/username) или публичную ссылку на канал. Нужна однократная авторизация Telethon в разделе «Парсинг» (владелец аккаунта).',
    vk: 'ВКонтакте: <code>club12345678</code>, короткое имя сообщества или числовой ID (с минусом для групп). В «Ключи API» должен быть токен парсинга VK.',
    max: 'MAX: укажите <strong>числовой chat_id</strong> чата или канала, откуда читать сообщения. Бот предложки MAX должен быть <strong>добавлен в этот чат</strong> и привязан к тому же каналу публикации, что выбран для парсинга. Достаточно вставить строку, где есть этот номер (например из ссылки).',
    dzen: 'Дзен: полный URL страницы ленты или канала (как в браузере).',
    rss: 'RSS: полный URL файла ленты (<code>https://…/feed.xml</code>).'
  };
  var placeholders = {
    telegram: '@channel_name или https://t.me/channel_name',
    vk: 'club12345',
    max: 'например 12345678901234',
    dzen: 'https://dzen.ru/…',
    rss: 'https://example.com/rss.xml'
  };

  function apply() {
    var v = plat.value || '';
    help.innerHTML = hints[v] || 'Выберите платформу — подсказка появится здесь.';
    inp.placeholder = placeholders[v] || '';
  }

  plat.addEventListener('change', apply);
  apply();
})();
</script>
{% endblock %}
