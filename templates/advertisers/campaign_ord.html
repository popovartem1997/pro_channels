{% extends 'base.html' %}
{% block title %}ВК ОРД · заявка #{{ app.pk }}{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Данные ВК ОРД</h1>
  <p class="text-muted small mb-0">Укажите внешние id из кабинета <a href="https://ord.vk.com" target="_blank" rel="noopener">ord.vk.com</a></p>
</div>
{% include 'advertisers/_campaign_steps.html' with step=4 %}
<form method="post" class="card border-0 shadow-sm">
  {% csrf_token %}
  <div class="card-body">
    <div class="mb-2">
      <label class="form-label small">Внешний ID договора</label>
      <input type="text" name="ord_contract_external_id" class="form-control font-monospace" value="{{ app.ord_contract_external_id }}">
    </div>
    <div class="mb-2">
      <label class="form-label small">Внешний ID контрагента (person)</label>
      <input type="text" name="ord_person_external_id" class="form-control font-monospace" value="{{ app.ord_person_external_id }}">
    </div>
    <div class="mb-3">
      <label class="form-label small">Внешний ID площадки (pad)</label>
      <input type="text" name="ord_pad_external_id" class="form-control font-monospace" value="{{ app.ord_pad_external_id }}">
    </div>
    <div class="d-flex gap-2 flex-wrap">
      <button type="submit" class="btn btn-brand">Далее</button>
      <a href="{% url 'advertisers:campaign_content' app.pk %}" class="btn btn-outline-secondary">Назад</a>
    </div>
  </div>
</form>
{% endblock %}
