{# Ожидает: ai_form_url — полный action формы; ai_post_moods — из контекста #}
{# Кнопки — те же btn-sm, что «В пост» / «Пропустить», чтобы высота и шрифт совпадали на десктопе #}
<div class="ai-mood-block border rounded-2 p-2 bg-light w-100">
  <div class="small fw-semibold text-muted mb-2">
    <i class="bi bi-stars me-1" style="color:var(--brand)"></i>AI — тон поста
  </div>
  <form method="post" action="{{ ai_form_url }}" class="m-0">
    {% csrf_token %}
    <div class="d-flex flex-wrap gap-2 align-items-center">
      {% for m in ai_post_moods %}
        <button type="submit" name="tone" value="{{ m.id }}"
                class="btn btn-outline-secondary btn-sm"
                title="{{ m.title }}">
          {{ m.label }}
        </button>
      {% endfor %}
    </div>
  </form>
</div>
