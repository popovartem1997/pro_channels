{% extends 'base.html' %}
{% block title %}Смена пароля{% endblock %}

{% block content %}
<div class="page-header">
  <a href="{% url 'profile' %}" class="btn btn-link text-muted p-0 mb-2 text-decoration-none small">
    <i class="bi bi-arrow-left me-1"></i> В профиль
  </a>
  <h1>Смена пароля</h1>
</div>

<div class="row justify-content-center">
  <div class="col-12 col-lg-6">
    <div class="card">
      <div class="card-body p-4 p-md-5">
        <form method="post" novalidate>
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Текущий пароль</label>
            {{ form.old_password }}
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Новый пароль</label>
            {{ form.new_password1 }}
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Повторите новый пароль</label>
            {{ form.new_password2 }}
          </div>
          <button type="submit" class="btn btn-brand px-4 fw-semibold">
            <i class="bi bi-check-lg me-1"></i> Сохранить
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
