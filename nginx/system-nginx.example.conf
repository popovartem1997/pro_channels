# Пример для Nginx, установленного НА СЕРВЕРЕ (system nginx), когда Django крутится в Docker
# и в compose у web проброшен порт "8001:8000".
#
# Скопируйте блок server { ... } в свой sites-enabled и поправьте пути к сертификатам.
# Иначе в location / оставляли бы proxy_pass http://web:8000 — с хоста имя web не резолвится → 502.

server {
    listen 443 ssl http2;
    server_name prochannels.ru www.prochannels.ru;

    client_max_body_size 50m;

    ssl_certificate     /etc/letsencrypt/live/prochannels.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prochannels.ru/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120;
    }
}

server {
    listen 80;
    server_name prochannels.ru www.prochannels.ru;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}
